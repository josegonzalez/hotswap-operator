# This rule is not used by the project hotswap-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to hotswap.io resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: hotswap-operator
    app.kubernetes.io/managed-by: kustomize
  name: hotswappolicy-viewer-role
rules:
- apiGroups:
  - hotswap.io
  resources:
  - hotswappolicies
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - hotswap.io
  resources:
  - hotswappolicies/status
  verbs:
  - get
