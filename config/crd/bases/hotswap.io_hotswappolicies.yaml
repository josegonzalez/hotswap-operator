                      format: int32
                      type: integer
                    healthy:
                      description: Healthy is the current probe verdict for this pod.
                      type: boolean
                    lastProbeTime:
                      format: date-time
                      type: string
                    lastTransitionTime:
                      format: date-time
                      type: string
                    podIP:
                      type: string
                    podName:
                      type: string
                  required:
