                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              consecutiveAttempts:
                description: ConsecutiveAttempts drives the circuit breaker.
                format: int32
                type: integer
              lastRemediation:
                description: LastRemediation records the most recent replacement action.
                properties:
                  podName:
                    type: string
                  reason:
                    type: string
                  strategy:
                    description: RemediationStrategy selects how an unhealthy target
                      is replaced.
                    enum:
                    - Auto
                    - RolloutRestart
                    - DeletePod
                    type: string
                  time:
                    format: date-time
                    type: string
                required:
                - podName
                - strategy
                - time
                type: object
              observedGeneration:
                description: ObservedGeneration is the .metadata.generation the status
